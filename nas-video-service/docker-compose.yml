services:
  unpack-video:
    build: .
    container_name: unpack-nas-video
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:4180:4180"
    volumes:
      - ./config:/config:ro
      - ./data:/data
      - /dev:/dev
    devices:
      - /dev/video0:/dev/video0
    security_opt:
      - no-new-privileges:true
